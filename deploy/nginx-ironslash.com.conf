# IronSlash — ironslash.com
# Ruta: /home/ivanam/projects/ironslash
#
#   npm install --include=dev && npm run build
#   sudo cp deploy/nginx-ironslash.com.conf /etc/nginx/sites-available/ironslash.com
#   sudo ln -sf /etc/nginx/sites-available/ironslash.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d ironslash.com -d www.ironslash.com

server {
    listen 80;
    listen [::]:80;
    server_name ironslash.com www.ironslash.com;

    root /home/ivanam/projects/ironslash/dist;
    index index.html;

    access_log /var/log/nginx/ironslash.com.access.log;
    error_log  /var/log/nginx/ironslash.com.error.log;

    location ~* \.(js|css|webp|svg|ico|woff|woff2|jpg|jpeg|png|gif|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
